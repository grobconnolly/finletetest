<script>
(function () {
  function nearest(el){ return el && (el.closest ? el.closest('a,button,[role="button"],[tabindex]') : el); }
  function getSlug() {
    // /athletes/<slug> OR /<slug>
    var m = location.pathname.match(/^\/(?:athletes\/)?([a-z0-9-]+)\/?$/i);
    return m ? m[1].toLowerCase() : null;
  }

  document.addEventListener('click', function (e) {
    var el = nearest(e.target);
    if (!el) return;

    var href = el.href || el.getAttribute('data-href') || '';
    var tracking = (el.getAttribute('data-tracking-id') || el.getAttribute('data-cta') || '').toLowerCase();

    // Fire when leaving to DealMaker OR when button was marked investstart in Framer
    if (href.includes('dealmaker.tech') || tracking === 'investstart') {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: 'invest_start',
        cta_text: (el.innerText || '').trim().slice(0, 120) || null,
        href: href || location.href,
        athlete_slug: getSlug(),
        tracking_id: tracking || 'investstart'
      });
    }
  }, { capture: true, passive: true });
})();
</script>
